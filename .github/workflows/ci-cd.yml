name: TraceForge AI CI/CD Pipeline

on:
  push:
    branches: [ "main", "frontend-phase" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ------------------------------------------------
  # 1. Build Java Services
  # ------------------------------------------------
  build-java-services:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - log-ingestion-service
          - log-processor-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        working-directory: ./backend/${{ matrix.service }} 
        run: mvn clean package -DskipTests

  # ------------------------------------------------
  # 2. Build AI Service
  # ------------------------------------------------
  build-ai-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./ai-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

  # ------------------------------------------------
  # 3. Build Frontend
  # ------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./traceforge
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./traceforge
        run: npm ci

      - name: Fix Vite permission
        working-directory: ./traceforge
        run: chmod +x node_modules/.bin/vite

  # ------------------------------------------------
  # 4. Build and Push Docker Images
  # ------------------------------------------------
  docker-build-push:
    runs-on: ubuntu-latest
    needs:
      - build-java-services
      - build-ai-service
      - build-frontend
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - name: traceforge-log-ingestion
            context: ./backend/log-ingestion-service
          - name: traceforge-log-processor
            context: ./backend/log-processor-service
          - name: traceforge-ai-service
            context: ./ai-service
          - name: traceforge-frontend
            context: ./traceforge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.name }}:latest